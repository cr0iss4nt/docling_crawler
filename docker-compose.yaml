services:
  api:
    build: .
    container_name: crawler
    ports:
      - "8000:8000"
    env_file: ".env"
    depends_on:
      - valkey
    networks:
      - shared-network

  valkey:
    image: valkey/valkey
    container_name: valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/valkey/storage
    networks:
      - shared-network

volumes:
  valkey_data:

networks:
  shared-network: